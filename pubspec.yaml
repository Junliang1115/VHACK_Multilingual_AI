name: gov_translator
description: A modern AI government translator app UI.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  file_picker: ^8.0.0
  http: ^1.2.0
  flutter_overlay_window: ^0.4.0
  android_intent_plus: ^6.0.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/Translator_Logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/Translator_Logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/Translator_Logo.png
  adaptive_icon_foreground_inset: 6
